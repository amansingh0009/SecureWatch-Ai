server:
  port: ${PORT:8080}

spring:
  application:
    name: securewatch-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/securewatch_ai?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-long-random-production-value}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://192.168.56.1:5173,http://localhost:3000,http://127.0.0.1:3000}
  ai:
    provider: ${AI_PROVIDER:openai}
    api-key: ${AI_API_KEY:}
    endpoint: ${AI_ENDPOINT:https://api.openai.com/v1/chat/completions}
    model: ${AI_MODEL:gpt-4o-mini}
  virustotal:
    api-key: ${VIRUSTOTAL_API_KEY:}
  scanner:
    nmap-path: ${NMAP_PATH:nmap}
    allow-active-checks: ${ALLOW_ACTIVE_CHECKS:false}
  notifications:
    from: ${MAIL_FROM:alerts@securewatch.local}
    admin-email: ${ADMIN_EMAIL:}

logging:
  level:
    com.securewatch: INFO
